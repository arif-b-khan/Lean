name: Secret Scanning

on:
    push:
        branches:
            - master
            - feature/**
    pull_request:
        branches:
            - master

jobs:
    detect-secrets:
        runs-on: ubuntu-latest
        name: Detect Secrets
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install detect-secrets
              run: pip install detect-secrets

            - name: Run secret scan on current changes
              run: |
                  # Scan only changed files in PR
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    git fetch origin ${{ github.base_ref }}
                    CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
                    if [ -z "$CHANGED_FILES" ]; then
                      echo "No changed files to scan"
                      exit 0
                    fi
                    detect-secrets scan $CHANGED_FILES --baseline .detect-secrets.baseline || true
                  else
                    # For push events, scan all files
                    detect-secrets scan --baseline .detect-secrets.baseline || true
                  fi

            - name: Check for high-confidence secrets
              run: |
                  # Run a stricter scan looking for common patterns
                  python3 << 'EOF'
                  import json
                  import re
                  import sys
                  from pathlib import Path

                  # Patterns for common credential formats
                  PATTERNS = {
                      'api_key': re.compile(r'(["\']?)(?:api[_-]?key|apikey)(["\']?)[\s:=]+["\']?([a-zA-Z0-9\-_.]+)["\']?', re.IGNORECASE),
                      'password': re.compile(r'(["\']?)password(["\']?)[\s:=]+["\']?([^"\'\s;,}]+)["\']?', re.IGNORECASE),
                      'token': re.compile(r'(["\']?)(?:token|auth[_-]?token|refresh[_-]?token)(["\']?)[\s:=]+["\']?([a-zA-Z0-9\-_.]+)["\']?', re.IGNORECASE),
                      'secret': re.compile(r'(["\']?)secret(["\']?)[\s:=]+["\']?([^"\'\s;,}]+)["\']?', re.IGNORECASE),
                      'private_key': re.compile(r'-----BEGIN [A-Z]+ PRIVATE KEY-----', re.IGNORECASE),
                  }

                  IGNORED_DIRS = {'.git', 'node_modules', '.venv', 'venv', 'bin', 'obj', '.dotnet', 'packages', 'target', 'build', 'dist'}
                  IGNORED_FILES = {'.gitignore', '.dockerignore', '.npmignore', '.prettierignore', 'config.example.json', 'config.sample.json', '*.sample.cs'}

                  found_secrets = False
                  for file_path in Path('.').rglob('*'):
                      # Skip ignored directories
                      if any(ignored in file_path.parts for ignored in IGNORED_DIRS):
                          continue

                      # Skip binary and non-text files
                      if file_path.is_file() and file_path.suffix in {'.dll', '.exe', '.o', '.so', '.pyc', '.class', '.jar'}:
                          continue

                      # Skip example/sample files
                      if any(file_path.name.endswith(pattern) for pattern in ['example.json', 'sample.json', 'sample.cs', 'example.cs']):
                          continue

                      # Skip test fixtures that might contain fake credentials
                      if 'test' in str(file_path).lower() and any(s in file_path.name for s in ['fixture', 'mock', 'fake']):
                          continue

                      if file_path.is_file():
                          try:
                              content = file_path.read_text(errors='ignore')
                              for pattern_name, pattern in PATTERNS.items():
                                  matches = pattern.findall(content)
                                  if matches:
                                      # Filter out false positives from config.json structure keys
                                      if file_path.name == 'config.json':
                                          # Only flag if it looks like an actual value, not a key definition
                                          if any(match[2] not in ['', 'YOUR_VALUE', '***', 'PLACEHOLDER'] for match in matches):
                                              print(f"⚠️ Potential {pattern_name} in {file_path}")
                                              found_secrets = True
                                      else:
                                          print(f"⚠️ Potential {pattern_name} in {file_path}")
                                          found_secrets = True
                          except (UnicodeDecodeError, IsADirectoryError):
                              pass

                  if found_secrets:
                      print("\n❌ Potential secrets detected. Please review and remove.")
                      sys.exit(1)
                  else:
                      print("\n✓ No high-confidence secrets detected.")
                  EOF

    truffleHog:
        runs-on: ubuntu-latest
        name: TruffleHog Secret Scan
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: TruffleHog scan
              uses: trufflesecurity/trufflehog@main
              with:
                  path: ./
                  base: ${{ github.event.repository.default_branch }}
                  head: HEAD
                  extra_args: --debug --only-verified
