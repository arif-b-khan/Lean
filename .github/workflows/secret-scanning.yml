name: Secret Scanning

on:
    push:
        branches:
            - master
            - feature/**
    pull_request:
        branches:
            - master

jobs:
    detect-secrets:
        runs-on: ubuntu-latest
        name: Detect Secrets
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install detect-secrets
              run: pip install detect-secrets

            - name: Run secret scan on current changes
              run: |
                  # Scan only JSON files for credential-like secrets
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                      git fetch origin ${{ github.base_ref }}
                      JSON_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.json')
                      if [ -z "$JSON_FILES" ]; then
                          echo "No changed JSON files to scan"
                          exit 0
                      fi
                      detect-secrets scan $JSON_FILES --baseline .detect-secrets.baseline || true
                  else
                      JSON_FILES=$(git ls-files '*.json')
                      if [ -z "$JSON_FILES" ]; then
                          echo "No tracked JSON files to scan"
                          exit 0
                      fi
                      detect-secrets scan $JSON_FILES --baseline .detect-secrets.baseline || true
                  fi

            - name: Check for high-confidence secrets
              run: |
                  # Inspect JSON property values instead of raw text to avoid flagging comments or key-name lists.
                  python3 << 'EOF'
                  import re
                  import sys
                  from pathlib import Path

                  SENSITIVE_KEY_PATTERN = re.compile(
                      r'(?:^|[-_])(?:password|token|secret|api[-_]?key|private[-_]?key)(?:$|[-_])',
                      re.IGNORECASE,
                  )
                  PROPERTY_PATTERN = re.compile(
                      r'^\s*"(?P<key>[^"]+)"\s*:\s*"(?P<value>(?:[^"\\]|\\.)*)"\s*,?\s*(?://.*)?$'
                  )
                  PLACEHOLDER_VALUES = {
                      '',
                      '***',
                      'your_value',
                      'placeholder',
                      'changeme',
                      'change_me',
                      'your_token_here',
                      'your_secret_here',
                      'your_api_key_here',
                  }

                  IGNORED_DIRS = {'.git', 'node_modules', '.venv', 'venv', 'bin', 'obj', '.dotnet', 'packages', 'target', 'build', 'dist'}

                  found_secrets = False
                  for file_path in Path('.').rglob('*'):
                      if any(ignored in file_path.parts for ignored in IGNORED_DIRS):
                          continue

                      if file_path.suffix.lower() != '.json':
                          continue

                      if file_path.is_file() and file_path.suffix in {'.dll', '.exe', '.o', '.so', '.pyc', '.class', '.jar'}:
                          continue

                      if any(file_path.name.endswith(pattern) for pattern in ['example.json', 'sample.json', 'sample.cs', 'example.cs']):
                          continue

                      if 'test' in str(file_path).lower() and any(s in file_path.name for s in ['fixture', 'mock', 'fake']):
                          continue

                      if file_path.is_file():
                          try:
                              for line in file_path.read_text(errors='ignore').splitlines():
                                  stripped = line.strip()
                                  if not stripped or stripped.startswith('//'):
                                      continue

                                  match = PROPERTY_PATTERN.match(line)
                                  if not match:
                                      continue

                                  key = match.group('key')
                                  if not SENSITIVE_KEY_PATTERN.search(key):
                                      continue

                                  value = bytes(match.group('value'), 'utf-8').decode('unicode_escape').strip()
                                  if value.lower() in PLACEHOLDER_VALUES:
                                      continue

                                  if value:
                                      print(f"⚠️ Potential credential value for '{key}' in {file_path}")
                                      found_secrets = True
                          except (UnicodeDecodeError, IsADirectoryError):
                              pass

                  if found_secrets:
                      print("\n❌ Potential secrets detected. Please review and remove.")
                      sys.exit(1)
                  else:
                      print("\n✓ No high-confidence secrets detected.")
                  EOF

    truffleHog:
        runs-on: ubuntu-latest
        name: TruffleHog Secret Scan
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: TruffleHog scan
              uses: trufflesecurity/trufflehog@main
              with:
                  path: ./
                  base: ${{ github.event.repository.default_branch }}
                  head: HEAD
                  extra_args: --debug --only-verified
